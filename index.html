<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>户外徒步目录</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* 两层背景 */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 1.2s ease-in-out;
}

/* 两个背景层 */
#bg1 { z-index: -2; opacity: 1; }
#bg2 { z-index: -3; opacity: 0; }

.overlay {
  position: relative;
  background: rgba(0,0,0,0.25);
  min-height: 100vh;
  padding: 50px 20px;
  text-align: center;
}

h1 {
  color: #ffeaa7;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
}

/* 卡片 */
ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0;
}

li {
  width: 260px;
  height: 130px;
  margin: 15px;
  border-radius: 16px;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  transition: transform .3s;
}

li:hover {
  transform: translateY(-6px);
}

a {
  color: #fff;
  text-decoration: none;
  background: rgba(0,0,0,0.35);
  padding: 6px 12px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay">
  <h1>户外徒步装备目录</h1>
  <ul id="list"></ul>
</div>

<script>
const images = [
  "https://images.unsplash.com/photo-1517821099607-31d3bbf1ffb0", // 雪山
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470", // 草地
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"  // 大海
];

// 预加载，避免闪空
images.forEach(src => {
  const img = new Image();
  img.src = src;
});

let i = 0;
let showFirst = true;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

function switchBg() {
  const next = images[i % images.length];

  if (showFirst) {
    bg2.style.backgroundImage = `url(${next})`;
    bg2.style.opacity = 1;
    bg1.style.opacity = 0;
  } else {
    bg1.style.backgroundImage = `url(${next})`;
    bg1.style.opacity = 1;
    bg2.style.opacity = 0;
  }

  showFirst = !showFirst;
  i++;
}

bg1.style.backgroundImage = `url(${images[0]})`;
i = 1;

setInterval(switchBg, 6000);

// 目录
const files = [
  { name: "七藏沟徒步装备", file: "七藏沟徒步装备.html", bg: images[0] }
];

const list = document.getElementById("list");

files.forEach(f => {
  const li = document.createElement("li");
  li.style.backgroundImage = `url(${f.bg})`;

  const a = document.createElement("a");
  a.href = f.file;
  a.textContent = f.name;
  a.target = "_blank";

  li.appendChild(a);
  list.appendChild(li);
});
</script>

</body>
</html>
