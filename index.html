<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>徒步装备目录</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-sub: #7f8c8d;
      --accent: #3498db;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
      position: relative;
    }

    h1::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: var(--accent);
      margin: 12px auto 0;
      border-radius: 2px;
    }

    ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    li {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    li:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      border-color: var(--accent);
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 30px 20px;
      text-decoration: none;
      color: var(--text-main);
      font-size: 1.1rem;
      font-weight: 500;
      text-align: center;
    }

    /* 移动端适配 */
    @media (max-width: 600px) {
      body { padding: 40px 16px; }
      h1 { font-size: 1.6rem; margin-bottom: 30px; }
      ul { grid-template-columns: 1fr; gap: 14px; }
      a { padding: 24px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <h1>徒步装备目录</h1>
  <ul>
    <li><a href="七藏沟徒步装备.html" target="_blank">🏔️ 七藏沟徒步装备</a></li>
    <!-- 以后可添加更多 HTML 文件 -->
  </ul>
</body>
</html>
